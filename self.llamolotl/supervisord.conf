[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:llama-server]
command=/app/llama-server
environment=LD_LIBRARY_PATH="/app/lib:%(ENV_LD_LIBRARY_PATH)s"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/llama-server.stdout.log
stderr_logfile=/var/log/supervisor/llama-server.stderr.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
priority=10

[program:axolotl-api]
; FastAPI server for controlling axolotl training jobs
command=/opt/venv/bin/uvicorn main:app --app-dir /workspace/axolotl-src/api --host 0.0.0.0 --port 8093 --log-level info
environment=PATH="/opt/venv/bin:%(ENV_PATH)s",PYTHONUNBUFFERED="1"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/axolotl-api.stdout.log
stderr_logfile=/var/log/supervisor/axolotl-api.stderr.log
stdout_logfile_maxbytes=20MB
stderr_logfile_maxbytes=20MB
priority=20

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock
