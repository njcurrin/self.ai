services:
  self-ollama:
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}
    container_name: self-ollama
    tty: true
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama

  self-llama:
    image: local/llama.cpp:server-cuda
    #pull_policy: build
    build:
      context: ./self.Llama
      dockerfile: .devops/cuda.Dockerfile
      target: server
      pull: false
    container_name: self-llama
    volumes:
      - /srv/ollama/models:/models
    env_file:
      - ./self.Llama/.env
    ports:
      - 8091:8080
    networks:
      - llama_internal
      - proxy_llama
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  selfUI:
    image: local/self.ai-ui:latest
    pull_policy: build
    build:
      context: ./self.UI
      dockerfile: Dockerfile
      pull: true
      #no_cache: true
    container_name: selfUI
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      #Databases
      #- self-postgres
      - self-valkey
      - self-qdrant
      #Inference
      - self-llama
      - self-ollama
      #HTTPS Proxy
      - self-traefik
    ports:
      - ${SELFAI_UI_PORT-3000}:8080
    env_file:
      - ./self.UI/.env
    # extra_hosts:
    #   - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - proxy_llama
      - llama_internal
  
  self-swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: swaggerUI
    profiles:
      - development
    environment:
      SWAGGER_JSON: /tmp/openapi.yaml
    volumes:
      - ./openapi.with-code-samples.yml:/tmp/openapi.yaml:ro
    ports:
      - 8092:8080
    restart: unless-stopped

  # self-postgres:
  #   image: postgres:18
  #   restart: unless-stopped
  #   container_name: self-postgres
  #   env_file: 
  #     - ./postgres/.env
  #   volumes:
  #     - ./postgres/data:/var/lib/postgresql
  #   networks:
  #     - llama_internal

  adminer:
    image: adminer:latest
    profiles:
      - troubleshoot
    container_name: adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - 8094:8080
    networks:
      - llama_internal
      - proxy_llama
  
  # redis database for paperless-ngx
  self-valkey:
    image: docker.io/valkey/valkey:8
    container_name: self-valkey
    restart: unless-stopped
    env_file: 
      - ./valkey/.env
    volumes:
      - ./valkey/data:/data
      - ./valkey/conf/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
    command: ["valkey-server", "/usr/local/etc/valkey/valkey.conf"]
    networks:
      - llama_internal

  self-traefik:
    image: traefik:v3.6
    container_name: self-traefik
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

#    environment:
      # Route53 needs a region set (Route53 is “global” but the AWS SDK still wants one)
      #- AWS_REGION=us-east-1
    env_file:
      - /opt/ai-stack/traefik/.env.traefik
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=ai-internal

      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

      # - --certificatesresolvers.ipa.acme.email=you@mateysmarsh.com
      # - --certificatesresolvers.ipa.acme.storage=/letsencrypt/ipa-acme.json
      # - --certificatesresolvers.ipa.acme.caserver=https://ipa-ca.home.mateysmarsh.com/acme/directory
      # - --certificatesresolvers.ipa.acme.cacertificates=/etc/ssl/certs/ipa-ca.crt
      # - --certificatesresolvers.ipa.acme.httpchallenge.entrypoint=web

      # # Let's Encrypt (TLS-ALPN challenge over 443)
      #- --certificatesresolvers.le.acme.dnsChallenge=true
      #- --certificatesresolvers.le.acme.dnsChallenge.provider=route53
      #- --certificatesresolvers.le.acme.dnsChallenge=marshmatey@mateysmarsh.com
      #- --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json

      # Logging (optional)
      - --log.level=INFO
      - --accesslog=true
      
      #File Providers
      - --providers.file.directory=/dynamic

    ports:
      - "80:80"
      - "443:443"
      # Optional: expose dashboard on the host (lock this down if you do)
      #- "8080:8080"

    volumes:
      # - /etc/ipa/ca.crt:/etc/ssl/certs/ipa-ca.crt:ro

      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/letsencrypt:/letsEncrypt:ro
      - ./traefik/config:/dynamic:ro

    networks:
      - proxy_llama
      - llama_internal
    
  self-qdrant:
    image: qdrant/qdrant:latest
    restart: always
    container_name: self-qdrant
    # ports:
    #   - 6333:6333
    #   - 6334:6334
    # configs:
    #   - source: qdrant_config
    #     target: /qdrant/config/production.yaml
    volumes:
      - /opt/ai-stack/qdrant/data:/qdrant/storage
      - /opt/ai-stack/qdrant/configs:/qdrant/config
    networks:
      - llama_internal
  

  wyoming-whisper:
    image: rhasspy/wyoming-whisper
    container_name: wyoming-whisper
    #entrypoint: ["script/run"]
    command:
      - --model
      - tiny-int8
      - --language
      - en
      - --uri
      - tcp://0.0.0.0:10300
      - --data-dir
      - /data
      - --download-dir
      - /data
    ports:
      - "10300:10300"
    volumes:
      - ./wyoming-whisper/data:/data
    stdin_open: true
    tty: true
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
   
networks:
  proxy_llama:
    name: proxy_llama
  llama_internal:
    name: llama_internal
    internal: true

volumes:
  ollama: {}
  open-webui: {}
  qdrant_config: {}
