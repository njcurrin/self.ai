[pytest]
testpaths = tests
markers =
    tier0: Core — must always pass, no external deps
    tier1: Integration — database only, runs in CI
    tier2: Contract — real services in Docker, runs on merge
    security: Security-focused tests (auth, injection, upload safety)
    slow: Tests taking >10 seconds
    gpu: Tests requiring GPU hardware
    integration: Tests requiring real external services
addopts = --strict-markers --tb=short
timeout = 60
filterwarnings =
    error::pytest.PytestUnknownMarkWarning
    ignore::DeprecationWarning:ldap3.*
    ignore::DeprecationWarning:pydub.*
    ignore::DeprecationWarning:passlib.*
    ignore::sqlalchemy.exc.MovedIn20Warning
